services:
  traefik:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    restart: unless-stopped

  dbv:
    build: .
    expose:
      - "8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-dbv}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-dbv}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.dbv.rule=Host(`${DBV_HOST:-dbv.localhost}`)
      - traefik.http.routers.dbv.entrypoints=websecure
      - traefik.http.routers.dbv.tls=true
      - traefik.http.routers.dbv.tls.certresolver=${TLS_RESOLVER:-}
      - traefik.http.services.dbv.loadbalancer.server.port=8080
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --health-enabled=true --proxy-headers=xforwarded --hostname-strict=false
    expose:
      - "8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_HOST:-keycloak.localhost}
      KC_HTTP_ENABLED: "true"
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_PUBLIC_HOST:-keycloak.localhost}`)
      - traefik.http.routers.keycloak.entrypoints=websecure
      - traefik.http.routers.keycloak.tls=true
      - traefik.http.routers.keycloak.tls.certresolver=${TLS_RESOLVER:-}
      - traefik.http.routers.keycloak.middlewares=keycloak-headers
      - traefik.http.services.keycloak.loadbalancer.server.port=8080
      - traefik.http.middlewares.keycloak-headers.headers.customrequestheaders.X-Forwarded-Proto=https
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9000 && printf \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q UP'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  mongo_data:
  traefik_certs:
