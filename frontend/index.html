<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dbv · MongoDB Browser</title>
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #2563eb;
        color: #fff;
        padding: 8px 16px;
        z-index: 9999;
        font-family: sans-serif;
        font-size: 14px;
        border-radius: 0 0 4px 0;
        text-decoration: none;
        transition: top 0.1s;
      }
      .skip-link:focus {
        top: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
