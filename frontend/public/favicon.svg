<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Database cylinder: top cap -->
  <ellipse cx="16" cy="9.5" rx="8" ry="2.5" fill="#00ed64"/>
  <!-- Cylinder sides -->
  <rect x="8" y="9.5" width="16" height="13" fill="#00ed64" opacity="0.18"/>
  <line x1="8"  y1="9.5" x2="8"  y2="22.5" stroke="#00ed64" stroke-width="1.5"/>
  <line x1="24" y1="9.5" x2="24" y2="22.5" stroke="#00ed64" stroke-width="1.5"/>
  <!-- Middle ring (data layer) -->
  <ellipse cx="16" cy="16" rx="8" ry="2.5" fill="none" stroke="#00ed64" stroke-width="1.2" opacity="0.6"/>
  <!-- Bottom cap -->
  <ellipse cx="16" cy="22.5" rx="8" ry="2.5" fill="#00ed64" opacity="0.55"/>
  <!-- Magnifying glass (browse indicator) -->
  <circle cx="23" cy="23" r="4" fill="#0f172a"/>
  <circle cx="23" cy="23" r="2.5" fill="none" stroke="#00ed64" stroke-width="1.4"/>
  <line x1="25" y1="25" x2="27.5" y2="27.5" stroke="#00ed64" stroke-width="1.4" stroke-linecap="round"/>
</svg>